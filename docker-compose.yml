services:
  supabase:
    build:
      context: .
      dockerfile: Dockerfile.supabase-runner
      args:
        SUPABASE_CLI_VERSION: 2.75.0
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    container_name: claris-supabase
    network_mode: host
    environment:
      RUNNER_CONTAINER_NAME: claris-supabase
      SUPABASE_API_URL: http://127.0.0.1:54321
      SUPABASE_PUBLIC_URL: "${SUPABASE_PUBLIC_URL:-http://127.0.0.1:54321}"
      EVOLUTION_API_URL: "${EVOLUTION_API_URL:-http://127.0.0.1:8081}"
      EVOLUTION_API_KEY: "${EVOLUTION_API_KEY:-claris-evolution-local-key}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-claris-webhook-secret-local}"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:54321/rest/v1/ > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 15
      # Cold CI runners still need time to pull the full Supabase stack before
      # Kong exposes the API, so give startup failures a wider grace window.
      start_period: 5m
    stop_grace_period: 2m
    restart: unless-stopped
