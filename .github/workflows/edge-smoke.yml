name: Edge Smoke Test

on:
  pull_request:
    paths:
      - .github/workflows/edge-smoke.yml
      - .env.example
      - docker-compose.yml
      - Dockerfile.supabase-runner
      - package.json
      - package-lock.json
      - scripts/deploy-supabase-functions.mjs
      - scripts/smoke-edge-functions.mjs
      - scripts/start-supabase.sh
      - supabase/**
  push:
    paths:
      - .github/workflows/edge-smoke.yml
      - .env.example
      - docker-compose.yml
      - Dockerfile.supabase-runner
      - package.json
      - package-lock.json
      - scripts/deploy-supabase-functions.mjs
      - scripts/smoke-edge-functions.mjs
      - scripts/start-supabase.sh
      - supabase/**
  workflow_dispatch:

concurrency:
  group: edge-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  smoke-edge:
    name: Smoke test local Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker images cache
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-images.tar
          key: supabase-docker-v1-${{ hashFiles('Dockerfile.supabase-runner', 'docker-compose.yml') }}
          restore-keys: |
            supabase-docker-v1-

      - name: Load cached Docker images
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-images.tar

      - name: Start Supabase runner
        run: docker compose up --build -d --wait supabase

      - name: Save Docker images to cache
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker save $(docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -v '<none>') \
            -o /tmp/supabase-docker-images.tar

      - name: Run Edge smoke test
        env:
          SUPABASE_RUNNER_CONTAINER: moodle-monitor-supabase
        run: npm run smoke:edge

      - name: Print Docker diagnostics
        if: always()
        run: docker ps -a

      - name: Print Supabase runner logs
        if: always()
        run: docker compose logs --no-color supabase

      - name: Stop local stack
        if: always()
        run: docker compose down -v
