name: Edge Smoke Test

on:
  pull_request:
    paths:
      - .github/workflows/edge-smoke.yml
      - .env
      - docker-compose.yml
      - Dockerfile.supabase-runner
      - package.json
      - package-lock.json
      - scripts/deploy-supabase-functions.mjs
      - scripts/smoke-edge-functions.mjs
      - scripts/start-supabase.sh
      - supabase/**
  push:
    paths:
      - .github/workflows/edge-smoke.yml
      - .env
      - docker-compose.yml
      - Dockerfile.supabase-runner
      - package.json
      - package-lock.json
      - scripts/deploy-supabase-functions.mjs
      - scripts/smoke-edge-functions.mjs
      - scripts/start-supabase.sh
      - supabase/**
  workflow_dispatch:

concurrency:
  group: edge-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke-edge:
    name: Smoke test local Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Start Supabase runner
        run: docker compose up --build -d --wait supabase

      - name: Run Edge smoke test
        env:
          SUPABASE_RUNNER_CONTAINER: moodle-monitor-supabase
        run: npm run smoke:edge

      - name: Print Docker diagnostics
        if: always()
        run: docker ps -a

      - name: Print Supabase runner logs
        if: always()
        run: docker compose logs --no-color supabase

      - name: Stop local stack
        if: always()
        run: docker compose down -v

  deploy-supabase:
    name: Deploy remote Supabase
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: smoke-edge
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
      SUPABASE_DB_PASSWORD: ${{ secrets['SUPABASE_PASSWORD'] }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Supabase credentials
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Configure o secret SUPABASE_ACCESS_TOKEN nas GitHub Actions."
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Configure o secret SUPABASE_PASSWORD nas GitHub Actions."
            exit 1
          fi

      - name: Resolve Supabase project ref
        shell: bash
        run: |
          project_ref="$(grep '^VITE_SUPABASE_PROJECT_ID=' .env | cut -d '=' -f2- | tr -d '"' | tr -d "'")"

          if [ -z "$project_ref" ]; then
            echo "::error::VITE_SUPABASE_PROJECT_ID nao foi encontrado em .env"
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=$project_ref" >> "$GITHUB_ENV"

      - name: Link remote Supabase project
        run: npm exec --yes --package supabase@latest -- supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push remote database migrations
        run: npm exec --yes --package supabase@latest -- supabase db push --linked --include-all

      - name: Deploy remote Edge Functions
        run: node scripts/deploy-supabase-functions.mjs --skip-link