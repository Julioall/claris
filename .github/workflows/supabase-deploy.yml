name: Deploy Supabase

on:
  workflow_run:
    workflows:
      - Edge Smoke Test
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy-supabase:
    name: Deploy remote Supabase
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
      SUPABASE_DB_PASSWORD: ${{ secrets['SUPABASE_PASSWORD'] }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Supabase credentials
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Configure o secret SUPABASE_ACCESS_TOKEN nas GitHub Actions."
            exit 1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Configure o secret SUPABASE_PASSWORD nas GitHub Actions."
            exit 1
          fi

      - name: Resolve Supabase project ref
        shell: bash
        run: |
          project_ref="$(grep '^VITE_SUPABASE_PROJECT_ID=' .env | cut -d '=' -f2- | tr -d '"' | tr -d "'")"

          if [ -z "$project_ref" ]; then
            echo "::error::VITE_SUPABASE_PROJECT_ID nao foi encontrado em .env"
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=$project_ref" >> "$GITHUB_ENV"

      - name: Link remote Supabase project
        run: npm exec --yes --package supabase@latest -- supabase --yes link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push remote database migrations
        run: npm exec --yes --package supabase@latest -- supabase --yes db push --linked --include-all

      - name: Deploy remote Edge Functions
        run: node scripts/deploy-supabase-functions.mjs --skip-link