services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: claris-frontend
    depends_on:
      supabase:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      VITE_SUPABASE_PROJECT_ID: local
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
      VITE_SUPABASE_URL: http://127.0.0.1:54321
    volumes:
      - ./src:/app/src:delegated
      - ./public:/app/public:delegated
      - ./index.html:/app/index.html:delegated
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Evolution API v2 - WhatsApp multi-device provider
  # ---------------------------------------------------------------------------
  # Docs: https://doc.evolution-api.com
  # Runs on the regular bridge network and reaches the host Supabase stack
  # through host.docker.internal, reducing the need for host networking.
  # ---------------------------------------------------------------------------
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: claris-evolution
    depends_on:
      supabase:
        condition: service_healthy
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SERVER_PORT: "8081"
      SERVER_URL: "http://127.0.0.1:8081"
      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE,PATCH"
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://postgres:postgres@host.docker.internal:54322/postgres?schema=evolution"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_CONNECTION_CLIENT_NAME: "claris_evolution"

      AUTHENTICATION_TYPE: "apikey"
      AUTHENTICATION_API_KEY: "claris-evolution-local-key"

      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#000000"

      WEBHOOK_GLOBAL_ENABLED: "false"
      LANGUAGE: "pt-BR"

      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "true"

      RABBITMQ_ENABLED: "false"
      SQS_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      PUSHER_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

volumes:
  evolution_instances:
